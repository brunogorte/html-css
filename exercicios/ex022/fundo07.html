<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento vertical</title>
    <style>
        #conteiner {
            background-image: url(imagem/target001.png);
            background-size: 100% 100%;
            position: relative;
            height: 96vh;
            padding: 10px;
            background-color: purple;

        }

        #conteudo {
            background-image: url(imagem/target001.png);
            background-size: 100% 100%;
            position: absolute;/*definindo o posicionamento absoluto para que o elemento seja posicionado em relação ao seu primeiro ancestral posicionado, nesse caso, o conteiner*/
            height: 200px;
            width: 400px;
            background-color: yellow;
            left: 50%;
            top: 50%;

            transform: translate(-50%, -50%);/*ajustando a posição do elemento para que ele fique centralizado, o translate move o elemento para a esquerda e para cima em 50% do seu próprio tamanho, compensando o deslocamento causado pelo left e top*/
        }
    </style>
</head>

<body>
    <section id="conteiner">
        <article id="conteudo">

        </article>
    </section>
</body>

</html>
