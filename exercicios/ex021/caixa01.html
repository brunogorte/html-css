<!DOCTYPE html> <!-- Declara que este documento é HTML5 -->
<html lang="pt-br"> <!-- Define o idioma do documento como português brasileiro -->
<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ajusta a escala da página em dispositivos móveis -->
    <title>Modelos de caixas</title> <!-- Título exibido na aba do navegador -->
    <style> 
        h1 { /* Seleciona o elemento h1 */
            background-color: lightgrey; /* Cor de fundo da caixa */
            height: 300px; /* Altura fixa da caixa */
            width: 300px; /* Largura fixa da caixa */
            border-width: 10px; /* Espessura da borda */
            border-style: solid; /* Estilo da borda */
            border-color: darkslategray; /* Cor da borda */
            padding-top: 10px; /* Espaçamento interno superior */
            padding-right: 10px; /* Espaçamento interno direito */
            padding-bottom: 10px; /* Espaçamento interno inferior */
            padding-left: 10px; /* Espaçamento interno esquerdo */
        }
        a { /* Seleciona o elemento de link (inline) */
            border-width: 10px; /* Espessura da borda do link */
            border-style: solid; /* Estilo da borda do link */
            border-color: red; /* Cor da borda do link */
        }
    </style> <!-- Fim dos estilos CSS internos -->
</head>
<body>
    <h1>Exemplo de caixa box-level</h1> <!-- Título demonstrando um elemento de nível bloco -->
    <p>Parágrafo também são exemplos de caixa box-level, mas os <a href="#">lins são exemplo de caixa inline-level</a>. Vamos ver como tudo isso funciona.</p> <!-- Parágrafo com link demonstrando elemento inline -->
</body>
</html>
