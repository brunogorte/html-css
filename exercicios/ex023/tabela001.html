<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif
        }
        table{
            width:400px;
            border-collapse:collapse; /* REMOVE OS ESPAÇOS ENTRE AS BORDAS */
        }
        tr.linha{
            background-color:lightgray;
        }
        td{
            border:1px solid black;
            padding:10px;

        }
        td.dado{
            background-color:yellow;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <!--HIERARQUIA DE TABELAS(SIMPLES)
      TABLE = TABELA
       TABLE ROW = LINHA DE TABELA
         TABLE HEADER = CABEÇALHO DE TABELA
              TABLE DATA = DADOS DE TABELA   
    -->
    <table>
        <tr> <!--PRIMEIRAQ LINHA-->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr class="linha"> <!--SEGUNDA LINHA-->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr> <!--TERCEIRA LINHA-->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr class="linha"> <!--QUARTA LINHA-->
            <td>A4</td>
            <td>B4</td>
            <td class="dado">C4</td>
        </tr>
    </table>
</body>
</html>
