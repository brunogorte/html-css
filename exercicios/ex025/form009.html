<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <h1>Exenplo de formulário</h1>
    <form action="#" method="post" autocomplete="on">
        <p>
            <label for="inum">Número: </label>
            <input type="range" name="num" id="inum" min="0" max="10" value="5" oninput="ival.innerHTML = Number(inum.value)">
            <output id="ival">5</output>
        </p>
        <p>
            <!-- Botão para enviar os dados do formulário ao destino definido em 'action'. -->
            <input type="submit" value="Enviar">
            <!-- Botão que limpa todos os campos do formulário, restaurando seus valores iniciais. -->
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>

</html>
