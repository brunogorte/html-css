<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com google fontes</title>
    <style>
        /* Importa a fonte 'Give You Glory' do Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Give+You+Glory&display=swap');

        /* Importa as fontes 'Give You Glory' e 'Rock Salt' do Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Give+You+Glory&family=Rock+Salt&display=swap');


        body {
            /* Aplica a fonte 'Rock Salt' a todo o corpo do documento */
            font-family: rock salt;
            font-size: 16px;
            color: black;
        }

        h1 {
            /* Aplica a fonte estilizada 'Give You Glory' aos títulos h1 */
            font-family: Give You Glory;
            font-size: 50px;

        }
    </style>
</head>

<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Temporibus dolorum voluptas illum quaerat sint facilis
        modi animi porro. Minima laboriosam consequuntur ratione reprehenderit aspernatur dolor adipisci repellat
        officia, sit harum!</p>
</body>

</html>
