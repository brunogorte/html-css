<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        /* Define a fonte padrão da página */
        body {
            font-family: Arial, Helvetica, sans-serif;

        }

        /* Esconde o parágrafo filho imediato dentro de qualquer <div> por padrão */
        div>p {
            display: none;

        }

        /* Quando o ponteiro estiver sobre a <div>, mostra o parágrafo filho e aplica estilo ao mesmo */
        div:hover>p {
            display: block;
            color: aqua;
            background-color: red;
            width: 300px;
        }

        /* Quando o ponteiro estiver sobre a <div>, aplica estilo (cor) ao texto dentro da própria <div> */
        div:hover {
            color: red;

        }
    </style>
</head>

<body>
    <h1>Exemplo de houver</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>
        Passe o mouse aqui

        <p>TEXTO ESCONDIDO .....</p>
    </div>
    <p>Fim do exemplo</p>
</body>

</html>
