<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        /* body é um seletor de elemento que aplica estilo ao elemento <body> inteiro */
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }

        /* a é um seletor de elemento para links (<a>)
           .classe seria um seletor de classe e é escrito com ponto, por exemplo .minha-classe
           :pseudo-classe seleciona um estado especial do elemento
           ::pseudo-elemento cria ou estiliza uma parte do elemento */
        a {
            color: red;
            text-decoration: none;
        }

        /* a:visited é uma pseudo-classe que altera o link depois que ele já foi visitado */
        a:visited {
            color: darkred;
        }

        /* a:hover é uma pseudo-classe que aplica estilo quando o mouse passa sobre o link */
        a:hover {
            color: black;
            text-decoration: underline;
        }

        /* a:active é uma pseudo-classe que aplica estilo enquanto o link está sendo clicado */
        a:active {
            color: yellow;
        }

        /* a::before é um pseudo-elemento que insere conteúdo antes do link */
        a::before {
            content: ' → ';
            color: blue;
        }

        /* a::after é um pseudo-elemento que insere conteúdo depois do link */
        a::after {
            content: ' ← ';
            color: blue;
        }
    </style>
</head>

<body>
    <h1>Pesonalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositorio Github</a></li>
        <li><a href="http://youtube.co/cursoemvideo/">Canal do YouTube</a></li>
        <li><a href="http://www.cursoemvideo.com">Site do Curso em video</a></li>
    </ul>
</body>

</html>
