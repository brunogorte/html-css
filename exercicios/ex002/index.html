<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>

<body>
    <h1>Parágrafos e quebras de linha</h1>
    <p>Você pode escrever um parágrafo de qualquer jeito.Basta colocar tudo no meio do par de tags &lt;p&gt; e
        &lt;/p&gt;.<!--&lt;LESS THAN/MENOR QUE &gt;GREATER THAN/MAIOR QUE-->
    </p>
    <br>
    <p>Se precisar quebrar o texto, basta usar a tag br. <br>como este</p>
    <p>Vamos adicionar alguns simbolos especiais:
        &copy; <!--&copy; COPYRIGHT/ DIREITOS AUTORAIS-->
        &reg; <!--&reg; REGISTRO/ MARCA REGISTRADA-->
        &trade; <!--&trade; MARCA COMERCIAL-->
        &euro; <!--&euro; EURO-->
        &pound; <!--&pound; LIBRA ESTRANGEIRA-->
        &yen; <!--&yen; IEN JAPONÊS-->
        &cent;<!--&cent; CENTAVO-->
        &delta; <!--&delta; LETRA GREGA DELTA-->
        &uarr; <!--&uarr; SETA PARA CIMA-->
    </p>
    <p> Vamos adicionar alguns emojis:
        🥳 &#x1F910 <!--&#x Antes do codigo que e pego no emojipedia.org -->
    </p>


</body>

</html>
