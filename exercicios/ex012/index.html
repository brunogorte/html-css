<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/BG.ico" type="image/x-icon">
    <title>Adicionando videos HTML5</title>
</head>

<body>
    <h1>Adicionando vídeos hospedado localmente</h1>
    <p>Este vídeo está hospedado em meu próprio servidor</p>
    <video width="500" height="600" poster="imagens/banner.png" controls autoplay loop playsinline >
        <source src="midia/Paisagem.mp4" type="video/mp4">
        <source src="midia/Paisagem.webm" type="video/webm"> 
        <p>Seu navegador não tem compatibilidade com esté vídeo</p>
   </video>
   <h1>Inserindo video do youTube</h1>
   <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=tattLBlJdSLr4RMG" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


</body>

</html>
