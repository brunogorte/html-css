<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="BG.ico" type="image/x-icon">
    <title>Midias em HTML</title>
</head>

<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse em varios dispositivo diferentes ou simplesmente aumente ou diminua o tamanho do seu navegador
    </p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexivel">
    </picture><!--PARA COLOCAR VARIAS IMAGENS DE VARIOS TAMANHO USA SOURCE MEDIA="(MAX-WIDTH: PX DA IMAGEM)
   SRCSET="URL DA IMAGEM" TYPE="IMAGE/PNG"-->
    <h1>Reprodução de áudio</h1>
    <p>Vamos aprender a reproduzir áudio em HTMl</p>
    <audio src="midia/whats.ogg" controls autoplay></audio>
    <audio>
        <source src="midia/whats.ogg" type="audio/ogg">
    </audio>

</body>

</html>
